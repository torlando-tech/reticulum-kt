coverage:
  status:
    project:
      default:
        # Don't fail on overall project coverage — it'll climb over time
        target: auto
        threshold: 5%
    patch:
      default:
        # Enforce 70% on new/changed lines in each PR
        target: 70%

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default
  require_changes: true
