name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run rns-core tests
        run: ./gradlew :rns-core:test

      - name: Run rns-interfaces tests
        run: ./gradlew :rns-interfaces:test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            rns-core/build/reports/tests/
            rns-interfaces/build/reports/tests/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install rns

      - name: Clone Reticulum reference implementation
        run: git clone --depth 1 https://github.com/markqvist/Reticulum.git /tmp/Reticulum

      - name: Clone LXMF reference implementation
        run: git clone --depth 1 https://github.com/markqvist/LXMF.git /tmp/LXMF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run rns-test tests
        env:
          PYTHON_RNS_PATH: /tmp/Reticulum
          PYTHON_LXMF_PATH: /tmp/LXMF
        run: ./gradlew :rns-test:test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: rns-test/build/reports/tests/
          retention-days: 14
