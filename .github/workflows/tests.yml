name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests with coverage
        run: ./gradlew :rns-core:test :rns-core:koverXmlReport :rns-interfaces:test :rns-interfaces:koverXmlReport --continue

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: |
            rns-core/build/reports/kover/report.xml
            rns-interfaces/build/reports/kover/report.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            rns-core/build/reports/tests/
            rns-interfaces/build/reports/tests/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install rns

      - name: Clone Reticulum reference implementation
        run: git clone --depth 1 https://github.com/markqvist/Reticulum.git /tmp/Reticulum

      - name: Clone LXMF reference implementation
        run: git clone --depth 1 https://github.com/markqvist/LXMF.git /tmp/LXMF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run rns-test tests with aggregated coverage
        env:
          PYTHON_RNS_PATH: /tmp/Reticulum
          PYTHON_LXMF_PATH: /tmp/LXMF
        # Root-level koverXmlReport aggregates execution data across rns-core,
        # rns-interfaces, and rns-test. `-x :rns-core:test -x :rns-interfaces:test`
        # keeps the coverage job fast by not re-running unit tests already
        # covered in the unit-tests job — codecov merges both uploads.
        run: ./gradlew :rns-test:test koverXmlReport -x :rns-core:test -x :rns-interfaces:test

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: rns-test/build/reports/tests/
          retention-days: 14
