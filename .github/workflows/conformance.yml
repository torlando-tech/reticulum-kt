name: Conformance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          path: reticulum-kt

      - uses: actions/checkout@v4
        with:
          repository: torlando-tech/reticulum-conformance
          path: reticulum-conformance

      - uses: actions/checkout@v4
        with:
          repository: markqvist/Reticulum
          path: Reticulum

      - uses: actions/checkout@v4
        with:
          repository: markqvist/LXMF
          path: LXMF

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pytest

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build conformance bridge and Kotlin pipe peer runtime artifacts
        working-directory: reticulum-kt
        run: ./gradlew :conformance-bridge:shadowJar :rns-core:jar :rns-interfaces:jar :rns-cli:classes

      - name: Resolve Kotlin pipe peer classpath
        working-directory: reticulum-kt
        run: |
          echo 'KOTLIN_PIPE_PEER_CLASSPATH<<EOF' >> "$GITHUB_ENV"
          ./gradlew -q :rns-cli:printPipePeerRuntimeClasspath | perl -pe 's/\e\][^\a]*\a//g' >> "$GITHUB_ENV"
          echo 'EOF' >> "$GITHUB_ENV"

      - name: Run bridge conformance tests
        working-directory: reticulum-conformance
        env:
          # Per-impl bridge overrides. Kotlin peers use the freshly-built
          # JAR from the matching checkout; reference peers use the default
          # Python bridge (conftest.py BRIDGE_COMMANDS["reference"]) so
          # cross-impl parametrization actually exercises both stacks.
          # The legacy CONFORMANCE_BRIDGE_CMD override was a superset of
          # both, which silently masked xfails keyed off transport_impl.
          CONFORMANCE_KOTLIN_BRIDGE_CMD: java -jar ${{ github.workspace }}/reticulum-kt/conformance-bridge/build/libs/ConformanceBridge.jar
          PYTHON_RNS_PATH: ${{ github.workspace }}/Reticulum
          PYTHON_LXMF_PATH: ${{ github.workspace }}/LXMF
        # tests/lxmf/ is the LXMF-layer conformance suite, owned by
        # LXMF-kt. It rides the same bridge but has its own CI target
        # (to be added in a follow-up PR on LXMF-kt); ignoring it here
        # keeps reticulum-kt CI focused on RNS-layer parity.
        run: python3 -m pytest tests/ --ignore=tests/lxmf --impl=kotlin -v --tb=short

      - name: Run pipe integration conformance tests
        working-directory: reticulum-conformance
        env:
          PYTHON_RNS_PATH: ${{ github.workspace }}/Reticulum
        # NOTE: this runs the canonical `integration/test_channel_window_pipe.py`
        # from the external `reticulum-conformance` repo. The in-tree copy at
        # `python-bridge/conformance/test_channel_window.py` is a development
        # scratch copy used when iterating locally; the external file is the
        # source of truth. Keep the two in sync when changing either.
        run: |
          python3 -m pytest integration/test_channel_window_pipe.py \
            --peer-cmd "java -cp \"$KOTLIN_PIPE_PEER_CLASSPATH\" network.reticulum.cli.PipePeerKt" \
            -v --tb=short
